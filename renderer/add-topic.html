<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thêm chủ đề học mới</title>
<style>
  body{
    margin:0; padding:24px;
    font-family:'Courier New', monospace;
    background:#EAE3D0; color:#1B2A3A;
  }
  h2{ font-family: Georgia, serif; font-size:18px; margin:0 0 6px; }
  p.hint{ font-size:12px; color:#4A5A68; margin:0 0 16px; }
  input[type=text]{
    width:100%; box-sizing:border-box; padding:10px 12px;
    font-family:inherit; font-size:14px;
    border:2px solid #1B2A3A; background:#F5F0E2; color:#1B2A3A;
    margin-bottom:10px;
  }
  button{
    padding:10px 18px; font-family:inherit; font-size:13px;
    letter-spacing:1px; text-transform:uppercase;
    background:#1B2A3A; color:#EAE3D0; border:none; cursor:pointer;
  }
  button:disabled{ opacity:0.5; cursor:default; }
  #status{ margin-top:14px; font-size:13px; min-height:40px; line-height:1.5; }
  .ok{ color:#3F6E52; font-weight:bold; }
  .err{ color:#A8502B; font-weight:bold; }
</style>
</head>
<body>
  <h2>Thêm chủ đề học mới</h2>
  <p class="hint">Nhập bất kỳ chủ đề nào — không chỉ tiếng Anh. AI sẽ soạn 8-12 thẻ ôn tập và đưa vào lịch FSRS.</p>
  <input id="topicInput" type="text" placeholder="vd: hàm số bậc 2, lịch sử Việt Nam thời Lý, thì hiện tại hoàn thành...">
  <button id="genBtn">Sinh thẻ ôn tập</button>
  <div id="status"></div>

  <script src="add-topic.js"></script>
</body>
</html>
