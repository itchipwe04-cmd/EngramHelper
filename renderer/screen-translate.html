<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dịch màn hình</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; font-family: 'Courier New', monospace;
    background: #000;
  }
  #screenshot {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #dim {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 14, 20, 0.55);
  }
  #statusBar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: rgba(27,42,58,0.9);
    color: #EAE3D0;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  #closeBtn {
    padding: 6px 14px;
    font-family: inherit; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase;
    background: #A8502B; color: #EAE3D0; border: none; cursor: pointer;
  }
  .box {
    position: absolute;
    background: rgba(63, 110, 82, 0.94);
    color: #F5F0E2;
    padding: 3px 6px;
    line-height: 1.25;
    box-sizing: border-box;
    overflow: hidden;
    border-radius: 2px;
    border: 1px solid rgba(245, 240, 226, 0.25);
  }
  #note {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #EAE3D0; font-size: 15px; text-align: center;
    background: rgba(27,42,58,0.85); padding: 16px 22px;
  }
</style>
</head>
<body>
  <img id="screenshot" src="" alt="">
  <div id="dim"></div>
  <div id="statusBar">
    <span id="statusText">Đang chuẩn bị...</span>
    <button id="closeBtn">Đóng (Esc)</button>
  </div>
  <div id="boxes"></div>

  <script src="screen-translate.js"></script>
</body>
</html>
